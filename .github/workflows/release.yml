name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-release-asset:
    name: Build release asset
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Package dist
        run: zip -r "higher-order-aberration-visualizer-${{ github.event.release.tag_name }}-dist.zip" dist

      - name: Upload release asset
        run: gh release upload "${{ github.event.release.tag_name }}" "higher-order-aberration-visualizer-${{ github.event.release.tag_name }}-dist.zip" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
